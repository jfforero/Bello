<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bello • VR Experience</title>
    <style>
        /* Reset y Estilos Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: #080202;
            color: #ffffff;
            overflow: hidden;
        }

        /* Fullscreen Experience Iframe Container */
        .iframe-container {
            width: 100%;
            height: 100%;
            background-color: #000000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Floating Return Button - CONFIGURADO ARRIBA A LA DERECHA */
        .btn-return {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 10000;
            padding: 12px 24px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff;
            background: rgba(8, 2, 2, 0.7);
            border: 1px solid #ff4d4d;
            border-radius: 4px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }

        .btn-return.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .btn-return:hover {
            background: #ff4d4d;
            color: #080202;
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.6);
            transform: translateY(-1px);
        }

        /* Welcome Overlay Stage */
        .welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(40,10,10,1) 0%, rgba(8,2,2,1) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 24px;
            z-index: 9999;
            transition: opacity 0.5s ease, pointer-events 0.5s ease;
            opacity: 1;
        }

        .welcome-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .header-container {
            margin-bottom: 48px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #ff4d4d;
            text-shadow: 0 0 20px rgba(255, 77, 77, 0.6);
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 2px;
            color: #e0e0e0;
            margin-bottom: 10px;
        }

        .effect-info {
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 1px;
            color: #a08888;
            font-style: italic;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 28px;
            width: 100%;
            max-width: 340px;
            margin-bottom: 60px;
        }

        .btn-enter {
            display: block;
            text-decoration: none;
            padding: 16px 30px;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff;
            background: transparent;
            border: 2px solid #ff4d4d;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-enter:hover {
            color: #080202;
            background: #ff4d4d;
            box-shadow: 0 0 25px rgba(255, 77, 77, 0.8);
            transform: translateY(-2px);
        }

        .btn-secondary {
            border-color: #ffffff;
        }

        .btn-secondary:hover {
            color: #080202;
            background: #ffffff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.7);
        }

        .project-footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .project-link {
            color: #a08888;
            text-decoration: none;
            border-bottom: 1px dashed rgba(160, 136, 136, 0.5);
            padding-bottom: 2px;
            transition: all 0.3s ease;
        }

        .project-link:hover {
            color: #ff4d4d;
            border-bottom: 1px solid #ff4d4d;
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.4);
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; letter-spacing: 2px; }
            .subtitle { font-size: 0.95rem; }
            .button-container { gap: 20px; margin-bottom: 40px; }
            .btn-enter { padding: 14px 20px; font-size: 0.85rem; letter-spacing: 1px; }
            .project-footer { bottom: 20px; font-size: 0.75rem; }
            .btn-return { top: 15px; right: 15px; padding: 10px 16px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <button class="btn-return" id="returnBtn" onclick="returnToHome()">Volver al Inicio</button>

    <div class="iframe-container">
        <iframe
            id="experienceFrame"
            src="about:blank"
            allow="accelerometer; gyroscope; magnetometer; vr; xr; xr-spatial-tracking; autoplay; camera; microphone; fullscreen"
            title="Entorno virtual Bello">
        </iframe>
    </div>

    <div class="welcome-overlay" id="welcomeOverlay">

        <div class="header-container">
            <h1>BELLO</h1>
            <p class="subtitle">Lo que acaba por no terminar</p>
            <p class="effect-info">Selecciona una opción</p>
        </div>

        <div class="button-container">
            <button onclick="launchEnvironment('visualizar.html')" class="btn-enter">
                VISUALIZAR ENTORNO VIRTUAL
            </button>

            <button onclick="launchEnvironment('https://jfforero-bello.hf.space')" class="btn-enter btn-secondary">
                GENERAR ENTORNO VIRTUAL
            </button>
        </div>

        <div class="project-footer">
            <a href="https://emotional-machines.com/poetry/bello/" target="_blank" class="project-link">
                Saber más sobre el proyecto
            </a>
        </div>

    </div>

    <script>
        const overlay = document.getElementById('welcomeOverlay');
        const frame = document.getElementById('experienceFrame');
        const returnBtn = document.getElementById('returnBtn');

        function launchEnvironment(url) {
            frame.onload = () => {
                try {
                    const scene = frame.contentDocument?.querySelector('a-scene');
                    if (scene && scene.hasLoaded) {
                        scene.resize();
                    } else if (scene) {
                        scene.addEventListener('loaded', () => scene.resize(), { once: true });
                    }
                } catch (e) {
                    /* cross-origin iframe */
                }
            };
            frame.src = url;
            overlay.classList.add('hidden');
            returnBtn.classList.add('visible');
        }

        function returnToHome() {
            overlay.classList.remove('hidden');
            returnBtn.classList.remove('visible');

            setTimeout(() => {
                frame.src = 'about:blank';
            }, 500);
        }
    </script>

</body>
</html>
